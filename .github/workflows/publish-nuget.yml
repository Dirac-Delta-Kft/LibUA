name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-pack-publish:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add GitHub Packages source
        run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Dirac-Delta-Kft/index.json"

      - name: Restore
        run: dotnet restore

      - name: Create strong-name key file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/keys" | Out-Null
          [IO.File]::WriteAllBytes(
            "build/keys/DiracDelta.ThirdParty.snk",
            [Convert]::FromBase64String("${{ secrets.DIRACDELTA_THIRDPARTY_SNK_BASE64 }}"))

      - name: Verify signing key file
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build
          Test-Path "build/keys/DiracDelta.ThirdParty.snk"

      - name: Print working directory
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack LibUA
        run: dotnet pack .\NET-Core\LibUA\LibUA.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to GitHub Packages
        shell: pwsh
        run: |
          $package = Get-ChildItem ./artifacts/*.nupkg |
            Where-Object { $_.Name -notlike '*.symbols.nupkg' } |
            Select-Object -First 1
      
          if (-not $package) {
            throw "No package was found in ./artifacts."
          }
      
          dotnet nuget push $package.FullName --source "github" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
